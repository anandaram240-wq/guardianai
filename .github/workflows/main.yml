name: Build APK
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - run: yes | sdkmanager --licenses || true
      - name: Make gradlew executable
        working-directory: guardian-agent/android
        run: chmod +x gradlew
      - name: Build APK
        working-directory: guardian-agent/android
        run: ./gradlew assembleDebug --no-daemon
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GuardianAI-APK
          path: guardian-agent/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
