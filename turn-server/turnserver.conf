# ═══════════════════════════════════════════════
# Coturn TURN Server Configuration
# Free WebRTC relay for live camera/audio
# ═══════════════════════════════════════════════

listening-port=3478
tls-listening-port=5349

fingerprint
lt-cred-mech

realm=turn.guardianai.local
server-name=guardianai-turn

# Credentials (change these!)
user=guardianai:StrongTurnPassword123!

# TLS certificates (from Let's Encrypt)
# cert=/etc/letsencrypt/live/DOMAIN/fullchain.pem
# pkey=/etc/letsencrypt/live/DOMAIN/privkey.pem

# Security
no-loopback-peers
no-multicast-peers
no-cli

# Mobile-friendly
mobility

# Logging
verbose
log-file=/var/log/coturn.log

# Port range for media relay
min-port=49152
max-port=65535
