# AdGuard Home Configuration — GuardianAI
# 100% Free, Open Source (GPL-3.0)
# Blocks 3,000,000+ adult/harmful domains silently

http:
  pprof:
    port: 6060
    enabled: false
  address: 0.0.0.0:3000
  session_ttl: 720h

users:
  - name: admin
    password: $2y$10$placeholder_will_be_set_in_setup_wizard

auth_attempts: 5
block_auth_min: 15
http_proxy: ""
language: en
theme: auto
debug_pprof: false

dns:
  bind_hosts:
    - 0.0.0.0
  port: 53
  anonymize_client_ip: false
  ratelimit: 20
  ratelimit_whitelist: []
  refuse_any: true
  upstream_dns:
    - https://cloudflare-dns.com/dns-query
    - https://dns.google/dns-query
    - tls://1.1.1.1
    - tls://8.8.8.8
  upstream_dns_file: ""
  bootstrap_dns:
    - 1.1.1.1
    - 1.0.0.1
    - 8.8.8.8
    - 8.8.4.4
  fallback_dns:
    - 1.1.1.1
    - 8.8.8.8
  upstream_mode: load_balance
  fastest_timeout: 1s
  allowed_clients: []
  disallowed_clients: []
  blocked_hosts:
    - version.bind
    - id.server
    - hostname.bind
  trusted_proxies:
    - 127.0.0.0/8
    - ::1/128
  cache_size: 4194304
  cache_ttl_min: 0
  cache_ttl_max: 0
  cache_optimistic: true
  bogus_nxdomain: []
  aaaa_disabled: false
  enable_dnssec: false
  edns_client_subnet:
    custom_ip: ""
    enabled: false
    use_custom: false
  max_goroutines: 300
  handle_ddr: true
  ipset: []
  ipset_file: ""
  bootstrap_prefer_ipv6: false
  upstream_timeout: 10s
  private_networks: []
  use_private_ptr_resolvers: true
  local_ptr_upstreams: []
  use_dns64: false
  dns64_prefixes: []
  serve_http3: false
  use_http3_upstreams: false

  # ── BLOCKING MODE ──────────────────────────────────────────────
  # null_ip = returns 0.0.0.0 for blocked domains
  # This is KEY to the Ghost Shield:
  # - Child's browser gets 0.0.0.0 as the IP
  # - Browser silently fails to connect (no error page)
  # - Child sees: blank tab or silent nothing
  # - NO "blocked" page. NO popup. NO message. 100% silent ✅
  blocking_mode: null_ip
  blocking_ipv4: ""
  blocking_ipv6: ""

tls:
  enabled: false
  server_name: ""
  force_https: false
  port_https: 443
  port_dns_over_tls: 853
  port_dns_over_quic: 784
  port_dnscrypt: 0
  dnscrypt_config_file: ""
  allow_unencrypted_doh: false
  certificate_chain: ""
  private_key: ""
  certificate_path: ""
  private_key_path: ""
  strict_sni_check: false

querylog:
  ignored: []
  interval: 24h
  size_memory: 1000
  enabled: true
  file_enabled: true

statistics:
  ignored: []
  interval: 24h
  enabled: true

filters:
  # ── ADULT & PORNOGRAPHY ─────────────────────────────────────────
  - enabled: true
    url: https://raw.githubusercontent.com/StevenBlack/hosts/master/alternates/porn/hosts
    name: "StevenBlack Porn Blocklist (800K+ adult sites)"
    id: 1

  - enabled: true
    url: https://raw.githubusercontent.com/nicehash/nicehash-filter/master/blocklist.txt
    name: "Gambling + Adult Extended"
    id: 2

  # ── ADULTERY / DATING SITES ─────────────────────────────────────
  - enabled: true
    url: https://raw.githubusercontent.com/mhhakim/pihole-blocklist/master/porn.txt
    name: "Adultery & Dating App Domains"
    id: 3

  # ── AD NETWORKS & POPUP ADS ────────────────────────────────────
  - enabled: true
    url: https://adguardteam.github.io/AdGuardSDNSFilter/Filters/filter.txt
    name: "AdGuard DNS Filter (2M+ ad/tracking domains)"
    id: 4

  - enabled: true
    url: https://raw.githubusercontent.com/hagezi/dns-blocklists/main/adblock/ultimate.txt
    name: "Hagezi Ultimate Blocklist (2M+ popup/ad/tracking)"
    id: 5

  - enabled: true
    url: https://pgl.yoyo.org/adservers/serverlist.php?hostformat=adblockplus&showintro=0&mimetype=plaintext
    name: "Peter Lowe Ad/Tracking Servers"
    id: 6

  # ── MALWARE & PHISHING ──────────────────────────────────────────
  - enabled: true
    url: https://malware-filter.gitlab.io/malware-filter/urlhaus-filter-agh.txt
    name: "URLhaus Malware Filter (protects child from malware)"
    id: 7

  - enabled: true
    url: https://phishing.army/download/phishing_army_blocklist_extended.txt
    name: "Phishing Army (50K+ phishing domains)"
    id: 8

  # ── COMPREHENSIVE BLOCK (OISD) ──────────────────────────────────
  - enabled: true
    url: https://big.oisd.nl
    name: "OISD Full (1.5M+ combined harmful domains)"
    id: 9

  # ── TRACKING & SPYWARE ──────────────────────────────────────────
  - enabled: true
    url: https://raw.githubusercontent.com/FadeMind/hosts.extras/master/add.2o7Net/hosts
    name: "2o7Net Tracking Domains"
    id: 10

  - enabled: true
    url: https://raw.githubusercontent.com/crazy-max/WindowsSpyBlocker/master/data/hosts/spy.txt
    name: "Spy/Privacy Invasion Domains"
    id: 11

  # ── BYPASS PREVENTION ───────────────────────────────────────────
  # Blocks proxy/VPN services child might use to bypass filtering
  - enabled: true
    url: https://raw.githubusercontent.com/StevenBlack/hosts/master/alternates/gambling/hosts
    name: "StevenBlack Gambling Hosts"
    id: 12

whitelist_filters: []

